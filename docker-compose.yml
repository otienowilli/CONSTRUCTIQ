version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: constructiq-db
    environment:
      POSTGRES_DB: constructiq
      POSTGRES_USER: constructiq_user
      POSTGRES_PASSWORD: constructiq_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - constructiq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constructiq_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: constructiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - constructiq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Laravel)
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: constructiq-backend
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: constructiq
      DB_USERNAME: constructiq_user
      DB_PASSWORD: constructiq_pass_2024
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_ENGINE_URL: http://ai-engine:8001
    volumes:
      - ./backend-api:/var/www/html
      - backend_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - constructiq-network

  # AI Engine (Python/FastAPI)
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: constructiq-ai
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://constructiq_user:constructiq_pass_2024@postgres:5432/constructiq
      REDIS_URL: redis://redis:6379
    volumes:
      - ./ai-engine:/app
      - ai_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - constructiq-network

  # IoT Gateway
  iot-gateway:
    build:
      context: ./iot-gateway
      dockerfile: Dockerfile
    container_name: constructiq-iot
    ports:
      - "8002:8002"
      - "1883:1883"  # MQTT
    environment:
      DATABASE_URL: postgresql://constructiq_user:constructiq_pass_2024@postgres:5432/constructiq
      BACKEND_API_URL: http://backend-api:8000
    volumes:
      - ./iot-gateway:/app
    depends_on:
      - postgres
      - backend-api
    networks:
      - constructiq-network

  # Web Dashboard (Next.js)
  web-dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: constructiq-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_AI_ENGINE_URL: http://localhost:8001
    volumes:
      - ./web-dashboard:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend-api
    networks:
      - constructiq-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: constructiq-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend-api
      - ai-engine
      - web-dashboard
    networks:
      - constructiq-network

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  ai_models:

networks:
  constructiq-network:
    driver: bridge

